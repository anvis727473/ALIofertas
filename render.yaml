services:
  - type: web
    name: aliexpress-deal-bot
    runtime: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MODE
        value: webhook
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALIEXPRESS_APP_KEY
        sync: false
      - key: ALIEXPRESS_APP_SECRET
        sync: false
      - key: ALIEXPRESS_TRACKING_ID
        sync: false
      - key: DEAL_CHANNEL_ID
        sync: false
